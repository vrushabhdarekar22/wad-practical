<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook clone</title>
    <link rel="stylesheet" href="bootstrap.min.css">
</head>
<body>

    <header class="bg-info">
        <div class="d-flex justify-content-between">
            <h1 class="pt-3 ms-3 fw-bold text-white ">facebook</h1>
    
            

            
             <form class="row mt-3 me-3">

                <div class="col-auto">
                    <label class="form-label">Email or Username</label>
                    <input class="form-control" type="email" placeholder="Email">

                    <div class="form-check">
                        <input type="checkbox" class="form-check-input">
                        <label class="form-check-label">Keep me logged in</label>
                    </div>
                </div>

                <div class="col-auto">
                    <label class="form-label">Password</label>
                    <input class="form-control" type="password" placeholder="Password">
                    <p>Forgotten my password</p>
                </div>

                <div class="col-auto mt-3">
                    <button class="btn btn-light btn-sm">
                        Login
                    </button>
                </div>
             </form> 

        </div>
    </header>


    <main class="py-4">

        <div class="container"> 
            <div class="row">
                <section class="col-md-6">
                    <h1>Facebook is useless without friends.</h1>
                    <h1>Make More Friends</h1>

                    <img src="img1.png" class="img-fluid">
                </section>

                <section class="col-md-6">
                    <div>
                        <h1>Create an Account</h1>
                        <p>It`s free and always will be</p>

                        <form class="form-control">
                           
                                <div class="d-flex">
                                    <input type="text" class="form-control" placeholder="Firstname">
                                    <input type="text" class="form-control" placeholder="Lastname">
                                </div>
                                <input type="email" class="form-control" placeholder="Email">
                                <input type="email" class="form-control" placeholder="Re-enter email">

                                <input type="password" class="form-control" placeholder="Password">
                                <input type="date" class="form-control">

                                <div class="form-check d-flex justify-content-left">
                                    <div class="me-3">
                                        <input type="radio" class="form-check-input" name="gender">
                                        <label class="form-check-label">Male</label>

                                    </div>
                                    <div class="ms-3">

                                        <input type="radio" class="form-check-input" name="gender">
                                        <label class="form-check-label">Female</label>
                                    </div>
                    
                                </div>
                        
                                <p>By clicking create ans account,you agree to our Terms</p>
                                <button class="btn btn-success">Signup</button>
                                <hr/>
                                <p>Create a page for you</p>
                           
                        </form>
                    </div>
                </section>
            </div>
        </div>

    </main>


    <footer>
        <p>English UK.....</p>
        <hr/>
        <p>Learn more.....</p>

    </footer>



    

    <script src="bootstrap.bundle.min.js"> </script>
</body>
</html>
