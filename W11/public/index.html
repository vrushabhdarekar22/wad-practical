<!DOCTYPE html>
<html>
<head>
    <title>Login & Registration</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">User System</h2>

    <div class="row">
        <!-- Registration -->
        <div class="col-md-6">
            <h4>Register</h4>
            <form id="registerForm">
                <input class="form-control mb-2" type="text" id="name" placeholder="Name">
                <input class="form-control mb-2" type="email" id="email" placeholder="Email">
                <input class="form-control mb-2" type="text" id="mobile" placeholder="Mobile">
                <input class="form-control mb-2" type="date" id="dob">
                <input class="form-control mb-2" type="text" id="city" placeholder="City">
                <textarea class="form-control mb-2" id="address" placeholder="Address"></textarea>
                <input class="form-control mb-2" type="text" id="username" placeholder="Username">
                <input class="form-control mb-2" type="password" id="password" placeholder="Password">

                <button class="btn btn-success w-100">Register</button>
            </form>
        </div>

        <!-- Login -->
        <div class="col-md-6">
            <h4>Login</h4>
            <form id="loginForm">
                <input class="form-control mb-2" type="text" id="loginUser" placeholder="Username">
                <input class="form-control mb-2" type="password" id="loginPass" placeholder="Password">
                <button class="btn btn-primary w-100">Login</button>
            </form>

            <p id="loginMsg" class="mt-3 text-danger"></p>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
