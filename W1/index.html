<!DOCTYPE html>
<html>

<head>
    <title>Product Catalog</title>

    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        h2 {
            text-align:center;
        }

        table {
            width: 100%;
            border-collapse: collapse; 
             /* keeps only one border */
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #f2f2f2;
        }

        img {
            width: 80px;
            height: 80px;
        }

        /* Responsive */
        @media (max-width: 768px) {

            table,
            th,
            td {
                font-size: 12px;
            }

            img {
                width: 50px;
                height: 50px;
            }
        }

        /* @media(max-width: 768px){
            table,th,td {
                font-size:12px;
            }
            img{
                width:50px;
                height: 50px;
            }
        } */

        .pagination {
            margin-top: 20px;
            text-align: center;
        }

        button {
            padding: 8px 15px;
            margin: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h2>Product Catalog</h2>

    <table id="productTable">
        <thead>
            <tr>
                <th>Image</th>
                <th>Product Name</th>
                <th>Price (₹)</th>
                <th>Description</th>
            </tr>
        </thead>
        <tbody>
            <!-- Data will come from JS -->
        </tbody>
    </table>

    <div class="pagination">
        <button onclick="prevPage()">Previous</button>
        <span id="pageInfo"></span>
        <button onclick="nextPage()">Next</button>
    </div>

    <script>
        const products = [
            { name: "Wireless Headphones", price: "7999", desc: "Noise-cancelling headphones", img: "https://via.placeholder.com/80" },
            { name: "Smartwatch", price: "12999", desc: "Fitness tracking smartwatch", img: "https://via.placeholder.com/80" },
            { name: "Gaming Mouse", price: "2499", desc: "Ergonomic gaming mouse", img: "https://via.placeholder.com/80" },
            { name: "Laptop Stand", price: "1999", desc: "Adjustable aluminium stand", img: "https://via.placeholder.com/80" },
            { name: "Keyboard", price: "1499", desc: "Mechanical keyboard", img: "https://via.placeholder.com/80" },
            { name: "Monitor", price: "10999", desc: "24 inch LED monitor", img: "https://via.placeholder.com/80" },
            { name: "USB Cable", price: "299", desc: "Fast charging cable", img: "https://via.placeholder.com/80" },
            { name: "Power Bank", price: "1999", desc: "10000mAh battery", img: "https://via.placeholder.com/80" },
            { name: "Speaker", price: "3499", desc: "Bluetooth speaker", img: "https://via.placeholder.com/80" },
            { name: "Router", price: "2499", desc: "WiFi router", img: "https://via.placeholder.com/80" },
            { name: "Tablet", price: "15999", desc: "Android tablet", img: "https://via.placeholder.com/80" },
            { name: "Camera", price: "25999", desc: "Digital camera", img: "https://via.placeholder.com/80" }
        ];

        let currentPage = 1;
        const rowsPerPage = 10;

        function displayProducts() {
            const tableBody = document.querySelector("#productTable tbody");
            tableBody.innerHTML = "";

            let start = (currentPage - 1) * rowsPerPage;
            let end = start + rowsPerPage;
            let pageItems = products.slice(start, end);
            /*slice(start, end) returns a part of an array
    
            start → index to begin
            end → index to stop (not included)*/

            pageItems.forEach(p => {
                let row = `<tr>
                    <td><img src="${p.img}"></td>
                    <td>${p.name}</td>
                    <td>₹${p.price}</td>
                    <td>${p.desc}</td>
                </tr>`;
                tableBody.innerHTML += row;//insert it into DOM
            });

            document.getElementById("pageInfo").innerText =
                `Page ${currentPage} of ${Math.ceil(products.length / rowsPerPage)}`;
        }

        function nextPage() {
            if (currentPage < Math.ceil(products.length / rowsPerPage)) {
                currentPage++;
                displayProducts();
            }
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                displayProducts();
            }
        }

        displayProducts();
    </script>

</body>

</html>
